[project]
name = "extsync-release-schema"
version = "0.1.0"
description = "Canonical ExtSync release metadata + Ed25519 signing (Python reference impl)."
requires-python = ">=3.12"
dependencies = [
    "cryptography>=42",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["extsync_release_schema"]
