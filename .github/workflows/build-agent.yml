name: Build Agent Installer

# Builds the Windows Agent + Native Host, packages an Inno Setup installer, and
# publishes it to GitHub Releases so /download can serve ExtSyncAgentSetup.exe.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/agent-windows/**"
      - "apps/native-host/**"
      - "installers/windows/**"
      - ".github/workflows/build-agent.yml"

permissions:
  contents: write

env:
  # Every build gets a real, increasing version so installed Agents can
  # detect and self-update to it (§28).
  AGENT_VERSION: 1.0.${{ github.run_number }}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Native Host (self-contained, single-file)
        run: >
          dotnet publish apps/native-host/ExtSync.NativeHost.csproj
          -c Release -r win-x64 --self-contained true
          -o installers/windows/stage/native-host

      - name: Publish Agent (self-contained)
        run: >
          dotnet publish apps/agent-windows/ExtSync.Agent/ExtSync.Agent.csproj
          -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false
          -p:Version=${{ env.AGENT_VERSION }}
          -o installers/windows/stage/agent

      - name: Embed platform public key (keys.json)
        shell: pwsh
        run: |
          '{ "key-2026-01": "WuEfobMXrxkfT8kiOLJgd8hqbyfjZ4jKN9jrlPMAf3M=" }' |
            Out-File -Encoding ascii installers/windows/stage/agent/keys.json

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ env.AGENT_VERSION }} installers/windows/extsync-agent.iss
          if (-not (Test-Path installers/windows/Output/ExtSyncAgentSetup.exe)) {
            throw "installer was not produced"
          }

      - name: Publish to GitHub Releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "agent-r${{ github.run_number }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists (re-run) - replacing the asset."
            gh release upload $tag installers/windows/Output/ExtSyncAgentSetup.exe --clobber
          } else {
            gh release create $tag installers/windows/Output/ExtSyncAgentSetup.exe `
              --title "ExtSync Agent ${{ env.AGENT_VERSION }}" `
              --notes "Automated Windows Agent build. Targets api.extsync.com." `
              --latest
          }

      - name: Register for self-update (server signs the build)
        shell: pwsh
        env:
          EXTSYNC_ADMIN_TOKEN: ${{ secrets.EXTSYNC_ADMIN_TOKEN }}
        run: |
          if (-not $env:EXTSYNC_ADMIN_TOKEN) {
            Write-Warning "EXTSYNC_ADMIN_TOKEN secret not set - skipping self-update registration."
            Write-Warning "Installed Agents will NOT see this build until it is registered."
            exit 0
          }
          $sha = (Get-FileHash installers/windows/Output/ExtSyncAgentSetup.exe -Algorithm SHA256).Hash.ToLower()
          $body = @{
            version      = "${{ env.AGENT_VERSION }}"
            channel      = "stable"
            download_url = "https://github.com/${{ github.repository }}/releases/download/agent-r${{ github.run_number }}/ExtSyncAgentSetup.exe"
            sha256       = $sha
            make_active  = $true
          } | ConvertTo-Json
          Invoke-RestMethod -Method Post -Uri "https://api.extsync.com/admin/agent-versions/register" `
            -Headers @{ Authorization = "Bearer $env:EXTSYNC_ADMIN_TOKEN" } `
            -ContentType "application/json" -Body $body | Out-Null
          Write-Host "Registered agent ${{ env.AGENT_VERSION }} (sha256=$sha) for self-update."

      - name: Upload build artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ExtSyncAgentSetup
          path: installers/windows/Output/ExtSyncAgentSetup.exe
          if-no-files-found: ignore
